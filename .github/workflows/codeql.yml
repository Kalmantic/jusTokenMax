name: "CodeQL"

# Advanced CodeQL setup. Replaces the repository's default setup so we can
# attach a custom configuration (.github/codeql/codeql-config.yml) that models
# our redaction helper as a sanitizer for the `py/clear-text-storage` query.
#
# NOTE: after this lands, disable "Default setup" under
# Settings -> Code security -> Code scanning, otherwise both configurations run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
